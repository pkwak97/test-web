<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>곽수혁 포트폴리오</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
        }
        .label {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>포트폴리오</h1>
        <p><span class="label">이름:</span> 곽수혁</p>
        <p><span class="label">나이:</span> 25세</p>
        <p><span class="label">학교:</span> 서울과학기술대학교</p>
        <p><span class="label">전공:</span> 건설시스템공학 (본전공)</p>
        <p><span class="label">복수전공:</span> 미래자동차학과</p>
    </div>
</body>
</html>
